<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tổ Ngữ văn</title>

<style>
body{font-family:Poppins;background:#f1f5f9;margin:0}

nav{background:#0f172a;padding:15px}
nav a{color:white}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{transform:translateY(-8px)}

.badge{background:#6366f1;color:white;padding:5px 10px;border-radius:6px}
</style>
</head>

<body>

<nav><a href="giaovien.html">← Quay lại</a></nav>

<div class="grid">

<div class="card"><h3>Nguyễn Thị Hồng Nhung</h3><span class="badge">Giáo viên</span></div>
<div class="card"><h3>Trần Thị Ngọc Thương</h3><span class="badge">Tổ trưởng</span></div>
<div class="card"><h3>Dương Đình Hậu</h3><span class="badge">Giáo viên</span></div>

</div>

</body>
</html>
