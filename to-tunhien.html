<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tổ Tự nhiên</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:linear-gradient(120deg,#dbeafe,#f8fafc)}

nav{
position:fixed;top:0;width:100%;
padding:15px 40px;
background:rgba(15,23,42,0.85);
backdrop-filter:blur(10px);
}
nav a{color:white;text-decoration:none}

.hero{
height:50vh;display:flex;align-items:center;justify-content:center;
color:white;text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1532094349884-543bc11b234d');
background-size:cover;
}

.container{margin-top:80px;padding:40px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
text-align:center;
transition:.4s;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 20px 50px rgba(0,0,0,.2);
}

.badge{
background:#2563eb;color:white;
padding:5px 10px;border-radius:8px;font-size:12px;
}
</style>
</head>

<body>

<nav><a href="giaovien.html">← Quay lại</a></nav>

<div class="hero">
<div>
<h1>TỔ TỰ NHIÊN</h1>
<p>19 giáo viên</p>
</div>
</div>

<div class="container">
<div class="grid">

<div class="card"><h3>Lưu Công Lĩnh</h3><span class="badge">Hiệu trưởng</span></div>
<div class="card"><h3>Hồ Diệp Uyên</h3><span class="badge">Phó hiệu trưởng</span></div>
<div class="card"><h3>Trần Ngọc Giao</h3><span class="badge">Phó hiệu trưởng</span></div>
<div class="card"><h3>Đậu Minh Tiến</h3><span class="badge">Tổ trưởng</span></div>
<div class="card"><h3>Vương Đình Thông</h3><span class="badge">Tổ phó</span></div>
<div class="card"><h3>Nguyễn Thị Huyền</h3><span class="badge">Tổ phó</span></div>

</div>
</div>

</body>
</html>
