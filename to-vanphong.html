<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tổ Văn phòng</title>

<style>
body{font-family:Poppins;background:#ecfeff;margin:0}

nav{background:#0f172a;padding:15px}
nav a{color:white}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{transform:scale(1.05)}

.badge{background:#06b6d4;color:white;padding:5px 10px;border-radius:6px}
</style>
</head>

<body>

<nav><a href="giaovien.html">← Quay lại</a></nav>

<div class="grid">

<div class="card"><h3>Nguyễn Thị Lan Hoa</h3><span class="badge">Y tế</span></div>
<div class="card"><h3>Nguyễn Thị Thanh</h3><span class="badge">Kế toán</span></div>
<div class="card"><h3>Hoàng Thị Thanh</h3><span class="badge">Thư viện</span></div>
<div class="card"><h3>Trần Đình Thế</h3><span class="badge">Văn thư</span></div>

</div>

</body>
</html>
